<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aguardando Aprovação</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  font-family:Arial;
  padding:20px;
}

h1{
  text-align:center;
}

.status{
  text-align:center;
  font-weight:bold;
  color:#ff9800;
  margin-bottom:20px;
}

.card{
  background:#eee;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.foto-perfil{
  width:100px;
  height:100px;
  border-radius:16px;
  object-fit:cover;
  display:block;
  margin:10px auto;
}

.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:25px;
  margin-top:10px;
  font-weight:bold;
}

.btn-whats{
  background:#25D366;
  color:#fff;
}

.btn-alt{
  background:#FFD600;
}
</style>

</head>

<body>

<h1>DADOS ENVIADOS</h1>

<img id="fotoPerfil" class="foto-perfil">

<div class="card">

<h3>Dados do motorista</h3>

<p><b>Nome:</b> <span id="nome"></span></p>
<p><b>Telefone:</b> <span id="telefone"></span></p>
<p><b>Endereço:</b> <span id="endereco"></span></p>
<p><b>CNH:</b> <span id="cnh"></span></p>
<p><b>Foto CNH:</b> enviada</p>

</div>

<div class="card">

<h3>Dados do veículo</h3>

<p><b>Foto da moto:</b> enviada</p>
<p><b>Placa:</b> <span id="placa"></span></p>
<p><b>Modelo:</b> <span id="modelo"></span></p>
<p><b>Cor:</b> <span id="cor"></span></p>
<p><b>Ano:</b> <span id="ano"></span></p>
<p><b>Renavan:</b> <span id="renavan"></span></p>
<p><b>Foto CRLV:</b> enviada</p>

</div>

<div class="status">
Status do cadastro: AGUARDANDO APROVAÇÃO ⏳
</div>

<button class="btn btn-whats">Pedir suporte (WhatsApp)</button>
<button class="btn btn-alt">Alterar dados</button>

<script src="script.js"></script>

</body>
</html>
