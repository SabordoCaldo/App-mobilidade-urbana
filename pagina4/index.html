<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro Motorista</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="conteudo">

<h1>CADASTRO MOTORISTA</h1>

<div class="foto-container">
  <img id="previewPerfil" src="foto/avatar-padrao.png">
</div>

<button class="btn-foto" onclick="abrirFoto('perfil')">Adicionar foto</button>
<input type="file" id="fotoPerfilInput" accept="image/*">

<label>Nome</label>
<div class="input-box">
  <input type="text" id="nome">
</div>

<label>Telefone</label>
<div class="input-box">
  <input type="tel" id="telefone">
</div>

<label>Endereço</label>
<div class="input-box">
  <input type="text" id="endereco">
</div>

<label>Número da CNH</label>
<div class="input-box">
  <input type="tel" id="cnh" maxlength="11" inputmode="numeric">
</div>

<label>Senha</label>
<div class="input-box">
  <input type="password" id="senha">
</div>

<label>Confirmar Senha</label>
<div class="input-box">
  <input type="password" id="confirmar">
</div>

<label>Foto da CNH</label>
<div class="cnh-container">
  <img id="previewCNH" src="foto/cnh-padrao.png">
</div>

<button class="btn-foto" onclick="abrirFoto('cnh')">Adicionar foto da CNH</button>
<input type="file" id="fotoCNHInput" accept="image/*">

<button class="btn" onclick="cadastrarMotorista()">Continuar</button>

<p style="text-align:center;">
  <a href="../pagina2/">Voltar</a>
</p>

</div>

<!-- 🚨 SEM ROTAS.JS -->
<script src="../data/motoristas.js"></script>
<script src="script.js"></script>

</body>
</html>
