<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro Motorista</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="conteudo">

<h1>CADASTRO MOTORISTA</h1>

<!-- FOTO PERFIL -->
<div class="foto-container">
  <img id="previewPerfil" src="foto/avatar-padrao.png">
</div>

<button class="btn-foto" onclick="abrirFoto('perfil')">Adicionar foto</button>
<input type="file" id="fotoPerfilInput" accept="image/*">

<!-- CAMPOS -->
<label>Nome</label>
<div class="input-box">
  <input type="text" id="nome">
</div>

<label>Telefone</label>
<div class="input-box">
  <input type="tel" id="telefone">
</div>

<label>Endereço</label>
<div class="input-box">
  <input type="text" id="endereco">
</div>

<label>Número da CNH</label>
<div class="input-box">
  <input type="tel" id="cnh" maxlength="11" inputmode="numeric" pattern="[0-9]*" placeholder="Somente números">
</div>

<label>Senha</label>
<div class="input-box">
  <input type="password" id="senha">

  <span class="eye" onclick="toggleSenha('senha', this)">
    <svg viewBox="0 0 24 24">
      <path d="M1 12C3.5 7 7.5 4 12 4s8.5 3 11 8c-2.5 5-6.5 8-11 8s-8.5-3-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </span>
</div>

<label>Confirmar Senha</label>
<div class="input-box">
  <input type="password" id="confirmar">

  <span class="eye" onclick="toggleSenha('confirmar', this)">
    <svg viewBox="0 0 24 24">
      <path d="M1 12C3.5 7 7.5 4 12 4s8.5 3 11 8c-2.5 5-6.5 8-11 8s-8.5-3-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </span>
</div>

<!-- FOTO CNH -->
<label>Foto da CNH</label>
<div class="cnh-container">
  <img id="previewCNH" src="foto/cnh-padrao.png">
</div>

<button class="btn-foto" onclick="abrirFoto('cnh')">Adicionar foto da CNH</button>
<input type="file" id="fotoCNHInput" accept="image/*">

<!-- BOTÕES -->
<button class="btn" onclick="cadastrarMotorista()">Continuar</button>

<p style="text-align:center;">
  <a href="../pagina2/" class="link-voltar">Voltar</a>
</p>

</div>

<script src="../js/rotas.js"></script>
<script src="../data/motoristas.js"></script>
<script src="script.js"></script>

</body>
</html>
