<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro Cliente</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}

h1{text-align:center;}

.foto-container{
  width:120px;
  height:120px;
  border:3px solid #FFD600;
  border-radius:20px;
  margin:20px auto;
  overflow:hidden;
}

.foto-container img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.btn-foto{
  display:block;
  margin:10px auto;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#FFD600;
  font-weight:bold;
}

.input-box{
  position:relative;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:20px;
  margin-bottom:15px;
  background:#ddd;
}

.eye{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:gray;
  font-size:18px;
}

.eye.off{
  color:red;
}

.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:25px;
  background:#ccc;
  font-weight:bold;
}

.btn.ativo{
  background:#FFD600;
}

.link-voltar{
  display:block;
  text-align:center;
  margin-top:15px;
  text-decoration:none;
  color:#6a0dad;
  font-weight:bold;
}
</style>

</head>

<body>

<h1>CADASTRO CLIENTE</h1>

<div class="foto-container">
  <img id="preview" src="foto/avatar-padrao.png">
</div>

<button class="btn-foto" onclick="abrirFoto()">Adicionar foto</button>
<input type="file" id="fotoInput" accept="image/*">

<label>Nome</label>
<input type="text" id="nome">

<label>Telefone</label>
<input type="tel" id="telefone">

<label>Endereço</label>
<input type="text" id="endereco">

<label>Senha</label>
<div class="input-box">
  <input type="password" id="senha">
  <span class="eye" onclick="toggleSenha('senha', this)">👁</span>
</div>

<label>Confirmar Senha</label>
<div class="input-box">
  <input type="password" id="confirmar">
  <span class="eye" onclick="toggleSenha('confirmar', this)">👁</span>
</div>

<button id="btnCadastrar" class="btn" disabled onclick="cadastrar()">Finalizar cadastro</button>

<a href="../pagina2/" class="link-voltar">Voltar</a>

<script src="script.js"></script>

</body>
</html>
