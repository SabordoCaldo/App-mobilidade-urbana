<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro Cliente</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="conteudo">

<h1>CADASTRO CLIENTE</h1>

<!-- FOTO -->
<div class="foto-container">
  <img id="preview" src="foto/avatar-padrao.png">
</div>

<button class="btn-foto" onclick="abrirFoto()">Adicionar foto</button>

<!-- 🔥 ESCONDIDO -->
<input type="file" id="fotoInput" accept="image/*" style="display:none;">

<label>Nome</label>
<div class="input-box">
  <input type="text" id="nome">
</div>

<label>Telefone</label>
<div class="input-box">
  <input type="tel" id="telefone" placeholder="(xx) xxxxx-xxxx">
</div>

<label>Endereço</label>
<div class="input-box">
  <input type="text" id="endereco">
</div>

<label>Senha</label>
<div class="input-box">
  <input type="password" id="senha" placeholder="mínimo 4 dígitos">

  <span class="eye" onclick="toggleSenha('senha', this)">
    <svg viewBox="0 0 24 24">
      <path d="M1 12C3.5 7 7.5 4 12 4s8.5 3 11 8c-2.5 5-6.5 8-11 8s-8.5-3-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </span>
</div>

<label>Confirmar Senha</label>
<div class="input-box">
  <input type="password" id="confirmar">

  <span class="eye" onclick="toggleSenha('confirmar', this)">
    <svg viewBox="0 0 24 24">
      <path d="M1 12C3.5 7 7.5 4 12 4s8.5 3 11 8c-2.5 5-6.5 8-11 8s-8.5-3-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </span>
</div>

<button class="btn" onclick="cadastrar()">Finalizar cadastro</button>

<p style="text-align:center;">
  <a href="../pagina2/" class="link-voltar">Voltar</a>
</p>

</div>

<script src="script.js"></script>

</body>
</html>
