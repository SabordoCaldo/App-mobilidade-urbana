<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro Cliente</title>

<link rel="stylesheet" href="style.css">

<link href="https://unpkg.com/cropperjs/dist/cropper.min.css" rel="stylesheet"/>
<script src="https://unpkg.com/cropperjs"></script>

</head>

<body>

<div class="conteudo">

<h1>CADASTRO CLIENTE</h1>

<!-- FOTO FINAL -->
<div class="foto-container">
  <img id="preview" src="foto/avatar-padrao.png">
</div>

<button class="btn-foto" onclick="abrirFoto()">Adicionar foto</button>
<input type="file" id="fotoInput" accept="image/*">

<label>Nome</label>
<div class="input-box">
  <input type="text" id="nome">
</div>

<label>Telefone</label>
<div class="input-box">
  <input type="tel" id="telefone">
</div>

<label>Endereço</label>
<div class="input-box">
  <input type="text" id="endereco">
</div>

<label>Senha</label>
<div class="input-box">
  <input type="password" id="senha">
</div>

<label>Confirmar Senha</label>
<div class="input-box">
  <input type="password" id="confirmar">
</div>

<button class="btn" onclick="cadastrar()">Cadastrar</button>

</div>

<!-- 🔥 MODAL DE CORTE -->
<div id="modalCrop" class="modal-crop">
  <img id="imagemCrop">
  <button onclick="confirmarFoto()">✔</button>
</div>

<script src="script.js"></script>

</body>
</html>
