<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro Cliente</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="conteudo">

<h1>CADASTRO CLIENTE</h1>

<!-- FOTO -->
<div class="foto-container">
  <img id="preview" src="foto/avatar-padrao.png">
</div>

<!-- BOTÃO TROCAR FOTO -->
<button class="btn-foto" onclick="abrirFoto()">Trocar foto</button>

<!-- INPUT OCULTO -->
<input type="file" id="fotoInput" accept="image/*" capture="environment">

<label>Nome</label>
<div class="input-box">
  <input type="text" id="nome" placeholder="Digite seu nome">
</div>

<label>Telefone</label>
<div class="input-box">
  <input type="tel" id="telefone" placeholder="(00) 00000-0000">
</div>

<label>Endereço</label>
<div class="input-box">
  <input type="text" id="endereco" placeholder="Digite seu endereço">
</div>

<label>Senha</label>
<div class="input-box">
  <input type="password" id="senha" placeholder="Senha">
</div>

<label>Confirmar Senha</label>
<div class="input-box">
  <input type="password" id="confirmar" placeholder="Confirmar senha">
</div>

<button class="btn" onclick="cadastrar()">Cadastrar</button>

<a href="../pagina2/" class="voltar">Voltar</a>

</div>

<script src="../data/clientes.js"></script>
<script src="script.js"></script>

</body>
</html>
