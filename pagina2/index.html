<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escolha</title>

<link rel="stylesheet" href="style.css">
<script src="../js/rotas.js"></script>
</head>

<body>

<div class="conteudo">

  <img src="img/logo.png" class="logo">

  <p class="sub">App de mobilidade urbana</p>

  <h1>ESCOLHA</h1>

  <!-- BOTÕES -->
  <button id="btnCliente" class="btn" onclick="selecionarTipo('cliente')">
    Sou Cliente
  </button>

  <button id="btnMotorista" class="btn" onclick="selecionarTipo('motorista')">
    Sou Motorista
  </button>

  <!-- CIDADE -->
  <label>Cidade</label>
  <select id="cidade">
    <option value="">Selecione a cidade</option>
    <option value="passos">Passos</option>
    <option value="outra">Outras cidades</option>
  </select>

  <!-- TERMOS LINK -->
  <a href="#" onclick="irTermos()" class="link-termos">Ver termos de uso</a>

  <!-- ACEITE -->
  <div class="aceite-termos">
    <input type="checkbox" id="aceite">
    <label for="aceite">ESTOU CIENTE E ACEITO OS TERMOS</label>
  </div>

  <!-- CONTINUAR -->
  <button id="continuar" class="btn btn-disabled" disabled onclick="continuar()">
    Continuar
  </button>

  <!-- VOLTAR -->
  <p style="text-align:center; margin-top:15px;">
    <a href="#" onclick="voltar()">Voltar</a>
  </p>

</div>

<script src="script.js"></script>
</body>
</html>
